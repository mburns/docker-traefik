version: "3.9"

services:
  # https://github.com/jesec/flood/wiki/Run-rTorrent-and-Flood-via-Docker
  flood:
    image: jesec/flood
    container_name: flood
    user: $PUID:$PGID
    restart: unless-stopped
    profiles: ["apps", "downloads", "all"]
    command: --port $FLOOD_PORT --allowedpath /data
    networks:
      - t2_proxy
    environment:
      HOME: /config
    volumes:
      - $DOCKERDIR/appdata/flood:/config
      - $DOWNLOADSDIR:/data
    ports:
      - $FLOOD_PORT:$FLOOD_PORT
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.flood-rtr.entrypoints=https"
      - "traefik.http.routers.flood-rtr.rule=Host(`flood.$DOMAINNAME_CLOUD_SERVER`)"
      ## Middlewares
      - "traefik.http.routers.flood-rtr.middlewares=chain-oauth@file"
      ## HTTP Services
      - "traefik.http.routers.flood-rtr.service=flood-svc"
      - "traefik.http.services.flood-svc.loadbalancer.server.port=$FLOOD_PORT"
      ## Homepage
      # - homepage.group=Downloaders
      # - homepage.name=Flood
      # - homepage.icon=flood.png
      # - homepage.href=https://flood.mirwin.net
      # - homepage.description=BitTorrent client
      # - homepage.weight=2

  geoip-updater:
    image: crazymax/geoip-updater:latest
    container_name: geoip-updater
    restart: always
    profiles: ["apps", "downloads", "all"]
    networks:
      - t2_proxy
    volumes:
      - "$DOCKERDIR/appdata/geoip:/data"
    env_file:
      - "env/geoip-updater.env"
      - ".env"

  # https://github.com/crazy-max/docker-rtorrent-rutorrent/blob/master/examples/compose/compose.yml
  rtorrent:
    image: crazymax/rtorrent-rutorrent:latest
    container_name: rtorrent
    restart: always
    profiles: ["apps", "downloads", "all"]
    networks:
      - t2_proxy
    network_mode: "service:gluetun"
    # expose:
    #   - "${RT_DHT_PORT}/udp"
    #   - "${XMLRPC_PORT}"
    #   - "${RUTORRENT_PORT}"
    #   - "${WEBDAV_PORT}"
    #   - "${RT_INC_PORT}"
    # ports:
    #   - 51413:51413
    #   - 6881:6881/udp
    #   - target: ${RT_DHT_PORT}
    #     published: ${RT_DHT_PORT}
    #     protocol: udp
    #   - target: ${RUTORRENT_PORT}
    #     published: ${RUTORRENT_PORT}
    #     protocol: tcp
    #   - target: ${WEBDAV_PORT}
    #     published: ${WEBDAV_PORT}
    #     protocol: tcp
    #   - target: ${RT_INC_PORT}
    #     published: ${RT_INC_PORT}
    #     protocol: tcp
    env_file:
      - "env/rtorrent-rutorrent.env"
      - ".env"
    volumes:
      - $DOCKERDIR/appdata/flood:/config
      - $DOWNLOADSDIR:/downloads
      - $DATADIR:/data
      # - "./passwd:/passwd"
    ulimits:
      nproc: 65535
      nofile:
        soft: 32000
        hard: 40000
    healthcheck: # https://github.com/qdm12/gluetun/issues/641#issuecomment-933856220
      test: "curl -sf https://example.com  || exit 1"
      interval: 1m
      timeout: 10s
      retries: 1
    labels: # Traefik labels added via gluetun
      - "deunhealth.restart.on.unhealthy=true"
    # labels:
    #   - "traefik.enable=true"
    #   ## HTTP Routers
    #   - "traefik.http.routers.rtorrent-rtr.entrypoints=https"
    #   - "traefik.http.routers.rtorrent-rtr.rule=Host(`rtorrent.$DOMAINNAME_CLOUD_SERVER`)"
    #   ## Middlewares
    #   - "traefik.http.routers.rtorrent-rtr.middlewares=chain-oauth@file"
    #   ## HTTP Services
    #   - "traefik.http.routers.rtorrent-rtr.service=rtorrent-svc"
    #   - "traefik.http.services.rtorrent-svc.loadbalancer.server.port=${RUTORRENT_PORT}"
    #   ## Homepage
    #   - homepage.group=Downloaders
    #   - homepage.name=rTorrent
    #   - homepage.icon=rtorrent.png
    #   - homepage.href=https://rtorrent.mirwin.net
    #   - homepage.description=BitTorrent client
    #   - homepage.weight=5

  # Gluetun - VPN Client for Docker Containers and More
  # Gluetun only for use by torrent clients + on demand lan devices.
  # Arr apps do not need VPN (not recommended), unless you have ISP/country restrictions.
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    # security_opt:
    #   - no-new-privileges:true
    restart: unless-stopped
    profiles: ["core", "all"]
    networks:
      - t2_proxy
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - "13087:8000" # Exposing qBittorrent through Docker Host LAN IP
    #   - 8888:8888/tcp # HTTP proxy
    #   - 8388:8388/tcp # Shadowsocks
    #   - 8388:8388/udp # Shadowsocks
    volumes:
      - $DOCKERDIR/appdata/gluetun:/gluetun
    environment:
      TZ: $TZ

      # Wireguard
      VPN_SERVICE_PROVIDER: surfshark
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: $SURFSHARK_WG_PRIVATE_KEY
      WIREGUARD_ADDRESSES: 10.14.0.2/16
      SERVER_COUNTRIES: Netherlands

    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.gluetun-qbittorrent-rtr.entrypoints=https"
      - "traefik.http.routers.gluetun-qbittorrent-rtr.rule=Host(`qbit.$DOMAINNAME_CLOUD_SERVER`)" # qBittorrent
      ## Middlewares
      - "traefik.http.routers.gluetun-qbittorrent-rtr.middlewares=chain-oauth@file" # qBittorrent
      ## HTTP Services
      - "traefik.http.routers.gluetun-qbittorrent-rtr.service=gluetun-svc" # qBittorrent
      - "traefik.http.services.gluetun-svc.loadbalancer.server.port=8000" # qBittorrent
      ## Homepage
      - homepage.group=Downloaders
      - homepage.name=Gluetun
      - homepage.icon=gluetun.png
      - homepage.href=https://qbit.mirwin.net
      - homepage.description=BitTorrent Client UI
      - homepage.weight=3
      - homepage.widget.type=gluetun
      - homepage.widget.url=http://gluetun:8000
