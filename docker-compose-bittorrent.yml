version: "3.9"

services:
  # https://github.com/jesec/flood/wiki/Run-rTorrent-and-Flood-via-Docker
  flood:
    image: jesec/flood
    container_name: flood
    user: $PUID:$PGID
    restart: unless-stopped
    profiles: ["apps", "downloads", "all"]
    command: --port $FLOOD_PORT --allowedpath /data
    networks:
      - t2_proxy
    environment:
      HOME: /config
    volumes:
      - $DOCKERDIR/appdata/flood:/config
      - $DOWNLOADSDIR:/data
    ports:
      - $FLOOD_PORT:$FLOOD_PORT
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.flood-rtr.entrypoints=https"
      - "traefik.http.routers.flood-rtr.rule=Host(`flood.$DOMAINNAME_CLOUD_SERVER`)"
      ## Middlewares
      - "traefik.http.routers.flood-rtr.middlewares=chain-oauth@file"
      ## HTTP Services
      - "traefik.http.routers.flood-rtr.service=flood-svc"
      - "traefik.http.services.flood-svc.loadbalancer.server.port=$FLOOD_PORT"
      ## Homepage
      # - homepage.group=Downloaders
      # - homepage.name=Flood
      # - homepage.icon=flood.png
      # - homepage.href=https://flood.mirwin.net
      # - homepage.description=BitTorrent client
      # - homepage.weight=4

  geoip-updater:
    image: crazymax/geoip-updater:latest
    container_name: geoip-updater
    restart: always
    profiles: ["apps", "downloads", "all"]
    networks:
      - t2_proxy
    volumes:
      - "$DOCKERDIR/appdata/geoip:/data"
    env_file:
      - "./geoip-updater.env"

  # https://github.com/crazy-max/docker-rtorrent-rutorrent/blob/master/examples/compose/compose.yml
  rtorrent:
    image: crazymax/rtorrent-rutorrent:latest
    container_name: rtorrent
    restart: always
    profiles: ["apps", "downloads", "all"]
    networks:
      - t2_proxy
    expose:
      - "${RT_DHT_PORT}/udp"
      - "${XMLRPC_PORT}"
      - "${RUTORRENT_PORT}"
      - "${WEBDAV_PORT}"
      - "${RT_INC_PORT}"
    ports:
      # - 51413:51413
      # - 6881:6881/udp
      - target: ${RT_DHT_PORT}
        published: ${RT_DHT_PORT}
        protocol: udp
      - target: ${RUTORRENT_PORT}
        published: ${RUTORRENT_PORT}
        protocol: tcp
      - target: ${WEBDAV_PORT}
        published: ${WEBDAV_PORT}
        protocol: tcp
      - target: ${RT_INC_PORT}
        published: ${RT_INC_PORT}
        protocol: tcp
    env_file:
      - "rtorrent-rutorrent.env"
      - ".env"
    volumes:
      - $DOCKERDIR/appdata/flood:/config
      - $DOWNLOADSDIR:/downloads
      - $DATADIR:/data
      # - "./passwd:/passwd"
    ulimits:
      nproc: 65535
      nofile:
        soft: 32000
        hard: 40000
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.rtorrent-rtr.entrypoints=https"
      - "traefik.http.routers.rtorrent-rtr.rule=Host(`rtorrent.$DOMAINNAME_CLOUD_SERVER`)"
      ## Middlewares
      - "traefik.http.routers.rtorrent-rtr.middlewares=chain-oauth@file"
      ## HTTP Services
      - "traefik.http.routers.rtorrent-rtr.service=rtorrent-svc"
      - "traefik.http.services.rtorrent-svc.loadbalancer.server.port=${RUTORRENT_PORT}"

